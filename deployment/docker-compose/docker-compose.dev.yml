version: '3.8'

# Define the logging template 
x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  db:
    <<: *default-logging
    image: postgres:15-alpine
    container_name: ticketing_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ticketing_system
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../db-init/init.sql:/docker-entrypoint-initdb.d/init.sql

  rabbitmq:
    <<: *default-logging
    image: rabbitmq:3-management
    container_name: ticketing_mq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  ticket-service:
    <<: *default-logging
    build: ../../services/ticket-service
    container_name: ticket_service
    restart: always
    ports:
      - "5001:5000"
    environment:
      - DB_HOST=db
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - db
      - rabbitmq

  support-service:
    <<: *default-logging
    build: ../../services/support-service
    container_name: support_service
    restart: always
    ports:
      - "5002:5000"
    environment:
      - DB_HOST=db
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - db
      - rabbitmq
      - ticket-service

  notification-service:
    <<: *default-logging
    build: ../../services/notification-service
    container_name: notification_service
    restart: always
    ports:
      - "5004:5000"
    environment:
      - DB_HOST=db
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
      - db

  reporting-service:
    <<: *default-logging
    build: ../../services/reporting-service
    container_name: reporting_service
    restart: always
    ports:
      - "5003:5000"
    environment:
      - DB_HOST=db
    depends_on:
      - db

  prometheus:
    <<: *default-logging
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    <<: *default-logging
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  frontend:
    <<: *default-logging
    build: ../../frontend
    container_name: frontend_dev
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - ticket-service
      - support-service
      - notification-service
      - reporting-service

volumes:
  postgres_data: