version: '3.8'

x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  db:
    <<: *default-logging
    image: postgres:15-alpine
    container_name: ticketing_prod_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ticketing_prod
    # no ports exposed — DB should NOT be reachable from outside in production
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ../../db-init/init.sql:/docker-entrypoint-initdb.d/init.sql

  rabbitmq:
    <<: *default-logging
    image: rabbitmq:3-management
    container_name: ticketing_prod_mq
    restart: always
    # no ports exposed — RabbitMQ UI should NOT be reachable from outside in production
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  ticket-service:
    <<: *default-logging
    build: ../../services/ticket-service
    container_name: ticket_service_prod
    restart: always
    ports:
      - "5001:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=ticketing_prod
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - db
      - rabbitmq

  support-service:
    <<: *default-logging
    build: ../../services/support-service
    container_name: support_service_prod
    restart: always
    ports:
      - "5002:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=ticketing_prod
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - db
      - rabbitmq

  notification-service:
    <<: *default-logging
    build: ../../services/notification-service
    container_name: notification_service_prod
    restart: always
    ports:
      - "5004:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=ticketing_prod
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
      - db

  reporting-service:
    <<: *default-logging
    build: ../../services/reporting-service
    container_name: reporting_service_prod
    restart: always
    ports:
      - "5003:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=ticketing_prod
    depends_on:
      - db

  prometheus:
    <<: *default-logging
    image: prom/prometheus:latest
    container_name: prometheus_prod
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    # no ports exposed — prometheus should not be public facing in production
    depends_on:
      - ticket-service
      - support-service
      - notification-service
      - reporting-service

  grafana:
    <<: *default-logging
    image: grafana/grafana:latest
    container_name: grafana_prod
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_prod_data: